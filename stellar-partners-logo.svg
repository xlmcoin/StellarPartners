<svg width="480" height="185" viewBox="0 0 480 185" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Stellar Partners</title>
  <desc>Stellar Partners logo — gold star mark with wordmark</desc>

  <style>
    .sp-gold { fill: #C49A3C; }
    .sp-silver { fill: #9BAAB8; }
    .sp-rule { stroke: #C49A3C; stroke-width: 1.5; }
  </style>

  <!-- Star mark -->
  <g transform="translate(240, 14)">
    <polygon class="sp-gold"
      points="0,-54 12,-18 50,-18 20,4 32,40 0,18 -32,40 -20,4 -50,-18 -12,-18"/>
    <polygon class="sp-silver"
      points="0,-54 12,-18 0,-28 -12,-18" opacity="0.55"/>
    <polygon class="sp-silver"
      points="0,18 -20,4 -10,4 0,-10 10,4 20,4" opacity="0.45"/>
    <line x1="32" y1="-22" x2="72" y2="-40" class="sp-rule" stroke-linecap="round"/>
    <circle cx="72" cy="-40" r="3.5" class="sp-gold"/>
  </g>

  <!-- STELLAR wordmark — dark version -->
  <text x="240" y="120" text-anchor="middle"
    font-family="Georgia, serif" font-size="48" font-weight="700"
    letter-spacing="10" fill="#0f1923">STELLAR</text>

  <!-- Rules + PARTNERS -->
  <line x1="60" y1="135" x2="128" y2="135" class="sp-rule"/>
  <text x="240" y="155" text-anchor="middle"
    font-family="Georgia, serif" font-size="16" font-weight="400"
    letter-spacing="12" fill="#C49A3C">PARTNERS</text>
  <line x1="352" y1="135" x2="420" y2="135" class="sp-rule"/>
</svg>
